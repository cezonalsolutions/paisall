<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pay ₹10</title>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f3f4f6;
    }

    .payment-box{
      width:320px;
      background:white;
      padding:30px;
      border-radius:18px;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
      text-align:center;
    }

    .payment-box h1{
      color:#111827;
      margin-bottom:10px;
      font-size:28px;
    }

    .payment-box p{
      color:#6b7280;
      margin-bottom:25px;
      font-size:15px;
      line-height:22px;
    }

    .pay-btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#2563eb;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    .pay-btn:hover{
      background:#1d4ed8;
    }

  </style>
</head>
<body>

  <div class="payment-box">

    <h1>Pay ₹10</h1>

    <p>
      Pay securely using UPI, PhonePe, Google Pay, Paytm,
      Cards and Net Banking.
    </p>

    <button class="pay-btn" id="payBtn">
      Pay Now
    </button>

  </div>

<script>

document.getElementById('payBtn').onclick = async function () {

  try {

    // Create order from backend

    const response = await fetch("https://razropay.onrender.com/create-order", {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      }

    });

    const data = await response.json();

    const options = {

      key: "rzp_live_SqrUSaPO5pA6gt",

      amount: data.order.amount,

      currency: data.order.currency,

      name: "Cezzo",

      description: "₹10 Payment",

      order_id: data.order.id,

      handler: function (response) {

        alert("Payment Successful");

        console.log(response);

      },

      prefill: {

        name: "Customer",

        email: "customer@example.com",

        contact: "9999999999"

      },

      theme: {

        color: "#2563eb"

      }

    };

    const rzp = new Razorpay(options);

    rzp.on('payment.failed', function (response){

      alert("Payment Failed");

      console.log(response.error);

    });

    rzp.open();

  }

  catch(error){

    console.log(error);

    alert("Something went wrong");

  }

}

</script>

</body>
</html>
